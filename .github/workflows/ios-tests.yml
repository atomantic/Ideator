name: iOS Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "/Applications/Xcode_15.4.app" || true
          xcodebuild -version
          xcodebuild -showsdks

      - name: List schemes
        run: xcodebuild -project Ideator/Ideator.xcodeproj -list

      - name: Build and test (iOS Simulator)
        run: |
          set -euo pipefail
          xcodebuild \
            -project Ideator/Ideator.xcodeproj \
            -scheme Ideator \
            -destination 'platform=iOS Simulator,OS=17.5,name=iPhone 15' \
            -derivedDataPath build \
            clean test | xcpretty && exit ${PIPESTATUS[0]}
        shell: bash

